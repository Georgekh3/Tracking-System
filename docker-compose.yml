services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier_inventory_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atelier
      POSTGRES_PASSWORD: atelier_password
      POSTGRES_DB: atelier_inventory
    ports:
      - "5432:5432"
    volumes:
      - atelier-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atelier -d atelier_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  atelier-postgres-data:
